services:
  # ── Backend: FastAPI + uvicorn ──────────────────────────────────────────────
  backend:
    build:
      context: .
      target: backend
    container_name: agentic-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://agentic:${POSTGRES_PASSWORD}@db:5432/agentic
      - QDRANT_URL=http://qdrant:6333
      - COHERE_API_KEY=${COHERE_API_KEY}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Frontend: Next.js production ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      target: frontend
    container_name: agentic-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: agentic-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=agentic
      - POSTGRES_USER=agentic
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (vector store) ───────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: agentic-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  qdrant_data: